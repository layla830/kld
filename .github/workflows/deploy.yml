name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
      CHATBOX_API_KEY: ${{ secrets.CHATBOX_API_KEY }}
      IM_API_KEY: ${{ secrets.IM_API_KEY }}
      DEBUG_API_KEY: ${{ secrets.DEBUG_API_KEY }}
      CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
      WORKER_NAME: ${{ vars.WORKER_NAME || 'companion-memory-proxy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare Cloudflare resources
        run: npm run setup:cloudflare

      - name: Prepare Worker secrets
        run: node scripts/write-worker-secrets.mjs

      - name: Deploy
        run: npx wrangler deploy --name "$WORKER_NAME" --secrets-file .wrangler-secrets.json --keep-vars
