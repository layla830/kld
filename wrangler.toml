name = "kld"
main = "src/index.ts"
compatibility_date = "2026-04-01"
keep_vars = true

[ai]
binding = "AI"

[vars]
# Visible model knobs. These are intentionally in wrangler.toml so they show
# up in Cloudflare Variables and can be changed without touching code.
PUBLIC_MODEL_NAME = "companion"
ENABLE_CHAT_GATEWAY = "false"
CHAT_MODEL = "deepseek/deepseek-v4-pro"
MEMORY_FILTER_PROVIDER = "openai-compatible"
MEMORY_FILTER_MODEL = "deepseek/deepseek-v4-flash"
MEMORY_FILTER_MAX_CANDIDATES = "12"
MEMORY_FILTER_MAX_OUTPUT = "6"
MEMORY_FILTER_MAX_CONTENT_CHARS = "700"
MEMORY_FILTER_OUTPUT_CHARS = "300"
MEMORY_FILTER_MIN_SCORE = "0.35"
MEMORY_MODEL = "deepseek/deepseek-v4-flash"
MEMORY_SEARCH_MAX_OUTPUT = "8"
AUTO_DIARY_ENABLED = "false"
AUTO_CHUNK_MIN_MESSAGES = "40"
AUTO_CHUNK_MAX_MESSAGES = "80"
AUTO_CHUNK_SUMMARY_MODEL = "deepseek/deepseek-v4-pro"
# Dream / nightly memory maintenance. Default OFF + dry-run ON per integration plan
# "Do Not Borrow Yet" constraint. First run via /v1/debug/dream_dry_run, review
# the plan, then set ENABLE_DREAM=true / DREAM_DRY_RUN=false to go live.
ENABLE_DREAM = "false"
ENABLE_FIVE_AXIS = "true"
FIVE_AXIS_DRY_RUN = "false"
DREAM_DRY_RUN = "true"
DREAM_MODEL = "deepseek/deepseek-v4-pro"
DREAM_TIME_ZONE = "Asia/Shanghai"
DREAM_MAX_MESSAGES = "40"
DREAM_MAX_RUNS = "5"
DREAM_MAX_TOKENS = "3000"
DREAM_MEMORY_CONTEXT_LIMIT = "40"
DREAM_EXCERPT_LIMIT = "8"
CC_CONNECT_MESSAGE_RETENTION_DAYS = "7"
MEMORY_RETENTION_MESSAGES_DAYS = "14"
MEMORY_RETENTION_USAGE_LOGS_DAYS = "30"
MEMORY_RETENTION_EVENTS_DAYS = "30"
MEMORY_RETENTION_IDEMPOTENCY_DAYS = "7"
MEMORY_RETENTION_TERMINAL_MEMORY_DAYS = "30"
MEMORY_RETENTION_THROTTLE_HOURS = "24"
VISION_MODEL = "google-ai-studio/gemini-3-flash-preview"
GUIDE_DOG_MODEL = "google-ai-studio/gemini-3-flash-preview"
ANTHROPIC_THINKING_ENABLED = "false"
ANTHROPIC_THINKING_BUDGET = "1024"
# For custom Anthropic-compatible providers whose base_url already ends in /v1,
# keep this as "messages". If the base_url is only the root domain, use
# "v1/messages".
CUSTOM_ANTHROPIC_MESSAGES_PATH = "messages"
# Temporary legacy-memory coordinate backfill. The dedicated cron processes at
# most five records per run and becomes a cheap no-op when the backlog is empty.
COORDINATE_BACKFILL_ENABLED = "true"
# E-axis shadow comparisons began with the first observability deployment.
# Keep the gate explicit so an unset variable cannot mean indefinite shadow.
E_AXIS_SHADOW_DAYS = "7"
E_AXIS_RANKING_ENABLED = "false"

# Private/account-specific variables live in the Cloudflare Dashboard:
# UPSTREAM_BASE_URL, UPSTREAM_API_KEY, CHATBOX_API_KEY, MEMORY_MCP_API_KEY,
# GUIDE_DOG_API_KEY. Optional Cloudflare AI Gateway mode can instead use
# AI_GATEWAY_BASE_URL and CF_AIG_TOKEN.
# D1 binding is auto-filled by `npm run setup:cloudflare`.

[[vectorize]]
binding = "VECTORIZE"
index_name = "memo-kb"

[[queues.producers]]
binding = "MEMORY_QUEUE"
queue = "companion-memory"

[[queues.consumers]]
queue = "companion-memory"
max_batch_size = 1
max_batch_timeout = 30
max_concurrency = 1

[triggers]
crons = ["10 20 * * *", "*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "companion_memory_proxy"
database_id = "a84c9bab-ff2f-46d7-af8f-4c4a6d7c5482"

